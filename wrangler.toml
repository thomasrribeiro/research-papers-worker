name = "research-papers-worker"
main = "src/index.js"
compatibility_date = "2024-01-01"

[dev]
port = 8787

[[d1_databases]]
binding = "DB"
database_name = "research-papers-db"
database_id = "814f09f8-50f9-486c-a926-d3925650f414"

[env.production]
name = "research-papers-worker-prod"

[[env.production.d1_databases]]
binding = "DB"
database_name = "research-papers-db"
database_id = "814f09f8-50f9-486c-a926-d3925650f414"

# Secrets to set via wrangler:
#   wrangler secret put PIPELINE_API_KEY
#   wrangler secret put ALLOWED_ORIGINS
#
# Production:
#   wrangler secret put PIPELINE_API_KEY --env production
#   wrangler secret put ALLOWED_ORIGINS --env production
